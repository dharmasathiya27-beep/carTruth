services:
  - type: web
    name: cartruth-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: USE_MOCK_DATA
        value: "false"
      - key: ALLOW_MOCK_MOT_FALLBACK
        value: "false"
      - key: CACHE_ENABLED
        value: "true"
      - key: REPORT_CACHE_VERSION
        value: v1
      - key: AI_REPORT_VERSION
        value: v1
      - key: ENABLE_LLM_REPORT_WRITER
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DVLA_API_KEY
        sync: false
      - key: DVSA_CLIENT_ID
        sync: false
      - key: DVSA_CLIENT_SECRET
        sync: false
      - key: DVSA_API_KEY
        sync: false
      - key: DVSA_SCOPE_URL
        value: https://tapi.dvsa.gov.uk/.default
      - key: DVSA_TOKEN_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
